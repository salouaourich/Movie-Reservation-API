name: CI

on:
  push:
    branches: [main, Phase-2, Phase-3, Phase-4]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend - lint + import smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Phase-2
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check app/ --select=E,F,W --ignore=E501

      - name: Import smoke test
        # Confirms app loads without DB/Redis (config is read but no connection made).
        env:
          DATABASE_URL: postgresql+asyncpg://u:p@localhost:5432/db
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-not-for-prod-use-only
          APP_ENV: dev
        run: python -c "import app.main; print('import ok')"

  backend-docker:
    name: Backend - docker build
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build prod image
        uses: docker/build-push-action@v5
        with:
          context: ./Phase-4
          file: ./Phase-4/Dockerfile
          push: false
          tags: cinema-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-build:
    name: Frontend - build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Phase-2/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Phase-2/frontend/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Build
        env:
          VITE_API_BASE: /api
        run: npm run build
